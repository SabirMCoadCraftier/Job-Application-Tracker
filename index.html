<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body class="bg-gray-100">

    <!-- ===== HEADER ===== -->
    <header class="max-w-6xl mx-auto px-4 py-8">
        <h1 class="text-4xl md:text-3xl font-bold text-[#002C5C] mb-8">
            Job Application Tracker
        </h1>

        <!-- Stats Section -->
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-6">
            <div class="bg-white shadow rounded-xl p-6 text-center">
                <p class="text-gray-500">Total</p>
                <p class="text-3xl font-bold text-[#002C5C]">8</p>
            </div>

            <div class="bg-white shadow rounded-xl p-6 text-center">
                <p class="text-gray-500 ">Interview</p>
                <p class="text-3xl font-bold text-green-600">0</p>
            </div>

            <div class="bg-white shadow rounded-xl p-6 text-center">
                <p class="text-gray-500">Rejected</p>
                <p class="text-3xl font-bold text-red-600">0</p>
            </div>
        </div>
    </header>

        <!-- ===== MAIN SECTION ===== -->
    <main class="max-w-6xl mx-auto px-4 py-6">

        <!-- Section Title + Count -->
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-bold text-[#002C5C]">Available Jobs</h2>
            <p class="text-gray-500">8 jobs</p>
        </div>

          <!-- Tabs -->
        <div class="flex gap-3 mb-8 flex-wrap">
            <button class="px-5 py-2 bg-black text-white rounded-lg cursor-pointer ">All</button>
            <button class="px-5 py-2 bg-gray-200 rounded-lg transition cursor-pointer ">Interview</button>
            <button class="px-5 py-2 bg-gray-200 rounded-lg cursor-pointer">Rejected</button>
        </div>
